services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: keyset
      POSTGRES_USER: keyset
      POSTGRES_PASSWORD: keyset
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keyset -d keyset"]
      interval: 2s
      timeout: 2s
      retries: 20
